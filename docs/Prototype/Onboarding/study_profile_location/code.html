<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Anchor (Step 1 of 3) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#0b1326]/80 backdrop-blur-xl shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors text-[#7bd0ff]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="font-['Manrope'] tracking-tight font-bold text-sm uppercase text-[#7bd0ff]">
            Step 1 of 3
        </div>
<button class="text-slate-400 hover:text-[#7bd0ff] transition-colors font-medium text-sm">
            Skip
        </button>
</header>
<!-- Content Canvas -->
<main class="flex-grow flex flex-col px-6 pt-32 pb-40 max-w-2xl mx-auto w-full">

<div class="w-full flex gap-2 mb-12">
<div class="h-1.5 flex-1 bg-primary rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container-highest rounded-full"></div>
</div>

<div class="mb-12">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface leading-tight">
                Where do you <br/>
<span class="text-primary italic">usually</span> study?
            </h1>
<p class="mt-4 text-on-surface-variant font-medium opacity-80 max-w-md">
                We'll tailor your academic sanctuary based on your preferred environment.
            </p>
</div>
<!-- Choice Grid - Asymmetric Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-6">
<!-- Option: Library (Large Anchor) -->
<button class="md:col-span-12 group relative overflow-hidden glass-card p-8 rounded-xl border border-transparent hover:border-primary/30 transition-all duration-300 text-left flex items-center justify-between !border-primary">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-xl bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-3xl text-primary">local_library</span>
</div>
<div>
<span class="block text-xl font-bold text-on-surface mb-1">Library</span>
<span class="block text-sm text-on-surface-variant">Quiet, structured, and resource-rich.</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center transition-colors"><div class="w-6 h-6 rounded-lg border-2 border-outline group-hover:border-primary flex items-center justify-center transition-all bg-primary border-primary">
<span class="material-symbols-outlined text-sm text-on-primary-fixed font-bold select-none">check</span>
</div></div>
</button>
<!-- Option: Home -->
<button class="md:col-span-6 group relative overflow-hidden glass-card p-8 rounded-xl border border-transparent hover:border-primary/30 transition-all duration-300 text-left">
<div class="w-14 h-14 rounded-xl bg-surface-container-highest flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-2xl text-on-surface-variant group-hover:text-primary transition-colors">home</span>
</div>
<div class="flex justify-between items-end">
<div>
<span class="block text-lg font-bold text-on-surface mb-1">Home</span>
<span class="block text-xs text-on-surface-variant leading-relaxed">Comfortable, private, and flexible.</span>
</div>
<div class="w-6 h-6 rounded-lg border-2 border-outline group-hover:border-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-sm text-primary opacity-0 group-hover:opacity-50 transition-opacity">check</span>
</div>
</div>
</button>
<!-- Option: Cafe -->
<button class="md:col-span-6 group relative overflow-hidden glass-card p-8 rounded-xl border border-transparent hover:border-primary/30 transition-all duration-300 text-left">
<div class="w-14 h-14 rounded-xl bg-surface-container-highest flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-2xl text-on-surface-variant group-hover:text-primary transition-colors">local_cafe</span>
</div>
<div class="flex justify-between items-end">
<div>
<span class="block text-lg font-bold text-on-surface mb-1">Cafe</span>
<span class="block text-xs text-on-surface-variant leading-relaxed">Ambient noise and social energy.</span>
</div>
<div class="w-6 h-6 rounded-lg border-2 border-outline group-hover:border-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-sm text-primary opacity-0 group-hover:opacity-50 transition-opacity">check</span>
</div>
</div>
</button><button class="md:col-span-12 group relative overflow-hidden glass-card p-8 rounded-xl border border-transparent hover:border-primary/30 transition-all duration-300 text-left flex items-center justify-between">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-xl bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">more_horiz</span>
</div>
<div>
<span class="block text-xl font-bold text-on-surface mb-1">Other</span>
<span class="block text-sm text-on-surface-variant">Any other study sanctuary.</span>
</div>
</div>
<div class="w-6 h-6 rounded-lg border-2 border-outline group-hover:border-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-sm text-primary opacity-0 group-hover:opacity-50 transition-opacity">check</span>
</div>
</button>
</div>

<div class="max-w-2xl mx-auto">
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/90 to-transparent -z-10 h-full w-full pointer-events-none"></div>
<button class="w-full h-16 rounded-full bg-gradient-to-br from-primary to-[#008abb] text-on-primary-fixed font-extrabold text-lg tracking-wide shadow-[0_8px_32px_rgba(123,208,255,0.2)] hover:shadow-[0_8px_40px_rgba(123,208,255,0.3)] transform active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</footer>

<div class="fixed top-0 right-0 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full -z-20 pointer-events-none"></div>
